<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroPlant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F7FAF7; height: 100vh; overflow: hidden; }
  iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

  .overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 9998;
    background: rgba(0,0,0,0.15);
  }
  .overlay.open { display: block; }

  .dd {
    display: none;
    position: fixed;
    top: 56px; right: 16px;
    z-index: 9999;
    background: #FFFFFF;
    border: 1px solid #E5EDE5;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    min-width: 220px;
    overflow: hidden;
  }
  .dd.open { display: block; }

  .dd-title {
    padding: 12px 20px 8px;
    font: 600 11px/1 'Inter', system-ui, sans-serif;
    color: #8FA58F;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .rb {
    display: block; width: 100%;
    text-align: left;
    background: none; border: none;
    border-top: 1px solid #F0F5F0;
    padding: 14px 20px;
    font: 14px/1.4 'Inter', system-ui, sans-serif;
    color: #1A2E1A;
    cursor: pointer;
  }
  .rb:hover { background: #F0F5F0; }
  .rb.a { background: #E8F5E9; color: #2E7D32; font-weight: 600; }
</style>
</head>
<body>

<div class="overlay" id="ov" onclick="cl()"></div>
<div class="dd" id="dd">
  <div class="dd-title">Выберите роль</div>
  <button class="rb a" onclick="go(0)">Управляющий</button>
  <button class="rb" onclick="go(1)">Начальник смены</button>
  <button class="rb" onclick="go(2)">Сотрудник смены</button>
  <button class="rb" onclick="go(3)">Закупщик</button>
  <button class="rb" onclick="go(4)">Менеджер по продажам</button>
</div>

<iframe id="frame" src="upravlyayushchiy.html"></iframe>

<script>
var files=['upravlyayushchiy.html','nachalnik-smeny.html','sotrudnik-smeny.html','zakupshchik.html','manager-prodazh.html'];
var cur=0, op=false;

function go(i){
  if(i!==cur){document.getElementById('frame').src=files[i];cur=i;}
  document.querySelectorAll('.rb').forEach(function(b,j){b.className='rb'+(j===i?' a':'');});
  cl();
}

function tg(){
  op=!op;
  document.getElementById('dd').className='dd'+(op?' open':'');
  document.getElementById('ov').className='overlay'+(op?' open':'');
}

function cl(){
  op=false;
  document.getElementById('dd').className='dd';
  document.getElementById('ov').className='overlay';
}

window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='toggleRoles') tg();
  if(e.data&&e.data.type==='switchRole') go(e.data.idx);
});
</script>
</body>
</html>
